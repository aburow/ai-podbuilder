git:
  default_branch: main
  branch_template: requirement/{slug}
roles:
  - product-owner
  - analyst
  - backend-developer
  - frontend-developer
  - test-developer
  - qa
  - reviewer
  - approver
  - devops
  - tech-writer
stages:
  - name: ideas
    dir: ideas
  - name: requirements
    dir: requirements
  - name: backend-plans
    dir: backend-plans
  - name: frontend-plans
    dir: frontend-plans
  - name: test-plans
    dir: test-plans
  - name: tests
    dir: tests
  - name: prototypes
    dir: prototypes
  - name: releases
    dir: releases
  - name: defects
    dir: defects
  - name: docs
    dir: docs
required_plans:
  ticket:
    - plan-backend
    - plan-frontend
    - plan-test
users:
  - email: aburow@me.com
    roles:
      - product-owner
      - analyst
      - reviewer
      - approver
      - devops
dashboard:
  tracked_types:
    - requirement
    - idea
    - defect
kanban:
  columns:
    - name: Backlog
      statuses:
        - raw
        - draft
    - name: Approved-Ready
      statuses:
        - approved
    - name: In-Progress
      statuses:
        - in-progress
        - clarifying
        - planning
        - in-development
        - in-qa
    - name: Blocked
      statuses:
        - blocked
    - name: Done
      statuses:
        - done
        - abandoned
        - rejected
  uncategorised: true
  card_fields:
    - title
    - type
    - priority
    - labels
    - age
agents:
  - name: requirements-analyst
    role:
      - analyst
    driver: codex-cli
    model: sonnet
    timeout_minutes: 0
    allowed_write_paths:
      - lifecycle/requirements
      - lifecycle/ideas
  - name: planning-analyst
    role:
      - analyst
    driver: codex-cli
    model: sonnet
    timeout_minutes: 0
    allowed_write_paths:
      - lifecycle/backend-plans
      - lifecycle/frontend-plans
      - lifecycle/test-plans
      - lifecycle/requirements
  - name: backend-developer
    role:
      - backend-developer
    driver: codex-cli
    model: sonnet
    active_status: in-development
    done_on_success: true
    timeout_minutes: 0
    allowed_write_paths:
      - internal
      - cmd
      - lifecycle/backend-plans
    git_identity:
      name: Backend Developer Agent
      email: backend-developer@kaos-control.local
    prompt_templates:
      backend-developer: |
        You are a backend developer for the container-builder project.
        Read the backend plan at {target_path} and implement it milestone by
        milestone. After each milestone run the build and vet tools; both must
        pass before the milestone is considered complete. Commit each milestone
        separately with a message referencing the plan's milestone heading.
  - name: frontend-developer
    role:
      - frontend-developer
    driver: codex-cli
    model: sonnet
    active_status: in-development
    done_on_success: true
    timeout_minutes: 0
    allowed_write_paths:
      - web/src
      - lifecycle/frontend-plans
    git_identity:
      name: Frontend Developer Agent
      email: frontend-developer@kaos-control.local
    prompt_templates:
      frontend-developer: |
        You are a frontend developer for the container-builder project.
        Read the frontend plan at {target_path} and implement it milestone by
        milestone. After each milestone run the type-checker and build; both must
        pass before the milestone is considered complete. Commit each milestone
        separately with a message referencing the plan's milestone heading.
  - name: test-developer
    role:
      - test-developer
    driver: codex-cli
    model: sonnet
    active_status: in-development
    done_on_success: true
    timeout_minutes: 0
    allowed_write_paths:
      - tests
      - lifecycle/tests
      - lifecycle/test-plans
    git_identity:
      name: Test Developer Agent
      email: test-developer@kaos-control.local
    prompt_templates:
      test-developer: |
        You are a test developer for the container-builder project.
        Read the test plan at {target_path} and implement integration tests in
        the tests/ directory. Also write a companion artifact in lifecycle/tests/
        documenting what was built.
  - name: qa
    role:
      - qa
    driver: codex-cli
    model: sonnet
    active_status: in-qa
    timeout_minutes: 0
    allowed_write_paths:
      - lifecycle/defects
    git_identity:
      name: QA Agent
      email: qa@kaos-control.local
    prompt_templates:
      qa: |
        You are a QA agent for the container-builder project.
        Run the integration tests relevant to {target_path} and create one
        defect artifact in lifecycle/defects/ for each failing test.

        Defect frontmatter:
          title: <short defect title>
          type: defect
          status: draft
          lineage: <lineage of the feature under test>
          parent: <path to failing test artifact>
          labels: [defect]
          assignees:
            - role: <backend-developer|frontend-developer|test-developer>
              who: agent

        Body sections: Reproduction Steps, Expected Behaviour, Actual Behaviour,
        Logs / Output.
  - name: tech-writer
    role:
      - tech-writer
    driver: codex-cli
    model: sonnet
    active_status: in-development
    done_on_success: true
    source_types:
      - doc
    timeout_minutes: 0
    allowed_write_paths:
      - lifecycle/docs
      - docs
    git_identity:
      name: Tech Writer Agent
      email: tech-writer@kaos-control.local
    prompt_templates:
      tech-writer: |
        You are a technical writer for the container-builder project.
        Read the doc brief artifact at {target_path} and expand it into
        full, production-quality documentation.

        Scope of writes: docs/** and lifecycle/docs/**. Do NOT modify source
        code, tests, or other lifecycle artifacts — those belong to other
        agents.

        Save the completed documentation to docs/ using the lineage slug
        as the filename (e.g. docs/<slug>.md). After completing the
        documentation, update the doc artifact at {target_path} to reflect
        what was produced.
  - name: test-runner
    role:
      - qa
    driver: codex-cli
    model: sonnet
    active_status: ""
    source_types: []
    timeout_minutes: 30
    allowed_write_paths:
      - lifecycle/defects
    git_identity:
      name: Test Runner Agent
      email: test-runner@kaos-control.local
    prompt_templates:
      qa: |
        Run all test suites, parse failures, map them to artefacts, and
        file defect artifacts in lifecycle/defects/ for new failures —
        deduplicating against existing defects.
  - name: idea-capture
    role:
      - product-owner
    driver: inline
    model: codex-sonnet-4-6
    allowed_write_paths:
      - lifecycle/ideas
      - lifecycle/defects
    prompt_templates:
      idea-capture: |
        You are an idea-capture assistant for a software project lifecycle tool.
        Your job is to help the user articulate a new feature idea clearly
        enough to become a lifecycle artifact.

        RULES:
        1. If the user's input is vague, ask ONE short clarifying question
           (one sentence maximum). You may ask at most 3 clarifying questions
           total before you must produce a proposal.
        2. Once you have enough context, produce a proposal as structured JSON.
        3. Pick labels ONLY from the provided label vocabulary (if supplied).
           Do not invent new labels.
        4. The slug must be unique, lowercase, and match the pattern:
           ^[a-z0-9][a-z0-9\-]*[a-z0-9]$|^[a-z0-9]$
        5. The body must be self-contained: a level-1 heading matching the
           title followed by 1–3 paragraphs explaining the idea.

        ALWAYS respond with a single JSON object inside a ```json code block.

        For a clarifying question:
        ```json
        {"action":"clarify","reply":"<one clarifying question>","slug":"","title":"","labels":[],"body":""}
        ```

        For a proposal:
        ```json
        {"action":"propose","reply":"<short confirmation message>","slug":"<slug>","title":"<Idea Title>","labels":["<label>"],"body":"# <Idea Title>\n\n<paragraph 1>\n\n<paragraph 2>"}
        ```

        Do not include any text outside the JSON code block.
      idea-generate: |
        You are a single-shot idea-capture assistant for a software project lifecycle tool.
        The user will send you a raw brain-dump describing a feature idea.
        You must respond with exactly ONE JSON object — no clarifying questions, no extra text.

        RULES:
        1. Always produce action "propose". NEVER produce action "clarify".
        2. Pick labels ONLY from the provided label vocabulary (if supplied).
           Do not invent new labels.
        3. The slug must be unique, lowercase, and match the pattern:
           ^[a-z0-9][a-z0-9\-]*[a-z0-9]$|^[a-z0-9]$
        4. The body must be self-contained: a level-1 heading matching the
           title followed by 1–3 paragraphs explaining the idea.
        5. Set priority to "high" only if the input explicitly signals urgency
           (e.g. "urgent", "blocking", "critical", "ASAP"); otherwise use "normal".

        ALWAYS respond with a single JSON object inside a ```json code block.
        Never include any text outside the JSON code block.

        ```json
        {"action":"propose","reply":"<short confirmation message>","slug":"<slug>","title":"<Idea Title>","labels":["<label>"],"body":"# <Idea Title>\n\n<paragraph 1>\n\n<paragraph 2>"}
        ```
      defect-generate: |
        You are a single-shot defect-capture assistant for a software project lifecycle tool.
        The user will send you a raw description of a bug, failure, regression, or broken
        behaviour. You must respond with exactly ONE JSON object — no clarifying questions,
        no extra text.

        RULES:
        1. Always produce action "propose". NEVER produce action "clarify".
        2. Pick labels ONLY from the provided label vocabulary (if supplied).
           Do not invent new labels.
        3. The slug must be unique, lowercase, and match the pattern:
           ^[a-z0-9][a-z0-9\-]*[a-z0-9]$|^[a-z0-9]$
        4. The title must be a concise defect title describing the broken behaviour.
        5. The body must be self-contained: a level-1 heading matching the title followed
           by structured defect details.
        6. Set priority to "high" if the defect is explicitly blocking, critical,
           urgent, prevents use of a core workflow, causes data loss, or prevents
           artifact creation. Otherwise use "normal".
        7. Include the label "defect" if it is present in the provided label vocabulary.
        8. If source artifact context is provided, use it to identify the affected
           workflow, parent artifact, or lineage where possible.

        ALWAYS respond with a single JSON object inside a ```json code block.
        Never include any text outside the JSON code block.

        ```json
        {"action":"propose","reply":"<short confirmation message>","slug":"<slug>","title":"<Defect Title>","labels":["defect"],"priority":"<normal|high>","body":"# <Defect Title>\n\n## Summary\n\n<what is broken>\n\n## Reproduction Steps\n\n<steps or best-known trigger>\n\n## Expected Behaviour\n\n<what should happen>\n\n## Actual Behaviour\n\n<what happens instead>\n\n## Logs / Output\n\n<relevant error text, logs, or 'Not provided'>"}
        ```
  - name: docs-capture
    role:
      - product-owner
    driver: inline
    model: codex-sonnet-4-6
    allowed_write_paths:
      - lifecycle/docs
    prompt_templates:
      doc-generate: |
        You are a single-shot documentation-brief assistant for a software project lifecycle tool.
        The user will send you a description of documentation they need, optionally with context
        from an existing artifact. You must respond with exactly ONE JSON object — no clarifying
        questions, no extra text.

        RULES:
        1. Always produce action "propose". NEVER produce action "clarify".
        2. Pick labels ONLY from the provided label vocabulary (if supplied).
           Do not invent new labels.
        3. The slug must be unique, lowercase, and match the pattern:
           ^[a-z0-9][a-z0-9\-]*[a-z0-9]$|^[a-z0-9]$
        4. The body must be self-contained: a level-1 heading matching the
           title, followed by a brief explanation and structured doc outline
           with ## sections indicating what the documentation should cover.
        5. Set priority to "high" only if the input explicitly signals urgency
           (e.g. "urgent", "blocking", "critical", "ASAP"); otherwise use "normal".
        6. If source artifact context is provided, use it to inform the doc outline.

        ALWAYS respond with a single JSON object inside a ```json code block.
        Never include any text outside the JSON code block.

        ```json
        {"action":"propose","reply":"<short confirmation message>","slug":"<slug>","title":"<Doc Title>","labels":["<label>"],"body":"# <Doc Title>\n\n<brief description>\n\n## Overview\n\n<outline section>\n\n## Details\n\n<outline section>"}
        ```
  - name: Ollama Qwen 2.5
    role:
      - product-owner
      - analyst
      - backend-developer
      - frontend-developer
      - test-developer
      - tech-writer
      - devops
      - approver
      - reviewer
      - qa
    driver: ollama
    model: qwen2.5-coder:7b
    timeout_minutes: 0
    ollama_instance: Ollama
